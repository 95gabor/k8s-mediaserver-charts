name: README sync

on:
  push:
    branches:
      - "main"
    paths:
      - "README.md"
      - "**/README.md"

concurrency:
  group: gh-pages-update
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: write # for git push

    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: pre-commit/action@v3.0.1

      - run: |
          find . -type f -name 'README.md' -exec cp --parents '{}' "${{ runner.temp }}" \;
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
      - run: |
          cp -r ${{ runner.temp }}/. .
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git add '**/README.md'
          if git diff --cached --quiet; then
            echo "No README changes to sync"
            exit 0
          fi
          git commit --signoff -m "Sync README from main"
          for attempt in 1 2 3; do
            if git pull --rebase origin gh-pages && git push origin HEAD:gh-pages; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Failed to push README sync after retries"
              exit 1
            fi

            sleep $((attempt * 5))
          done
