name: Check for App Version Updates

on:
  schedule:
    # Run every day at 8 AM UTC
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  check-updates:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Check for updates
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/check_for_updates.py

      - name: Show updates
        if: steps.check.outputs.has_updates == 'true'
        run: |
          echo "## Available Updates" >> $GITHUB_STEP_SUMMARY
          cat updates.json | python -m json.tool >> $GITHUB_STEP_SUMMARY

      - name: Update chart versions
        if: steps.check.outputs.has_updates == 'true'
        run: python scripts/apply_chart_updates.py

      - name: Prepare PR body and commit message
        if: steps.check.outputs.has_updates == 'true'
        id: pr_info
        run: python scripts/prepare_app_versions_pr.py

      - name: Clean up temporary files
        if: steps.check.outputs.has_updates == 'true'
        run: rm -f updates.json

      - name: Run pre-commit hooks
        if: steps.check.outputs.has_updates == 'true'
        run: pre-commit run --all-files || pre-commit run --all-files

      - name: Set current date
        if: steps.check.outputs.has_updates == 'true'
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.check.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: ${{ steps.pr_info.outputs.commit_message }}
          title: "chore: update app versions ${{ steps.date.outputs.date }}"
          body: ${{ steps.pr_info.outputs.pr_body }}
          branch: bump/app-versions
          sign-commits: true
          delete-branch: true
          labels: |
            automated
            dependencies
